<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude-Testing Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/index.css">
</head>

<body>
    <template id="user-message-template">
        <div class="user-message-container">
            <div class="user-message">
                <p id="user-text" class="user-text"></p>
                <figure class="image-container">
                    <i class="bi bi-person user-image"></i>
                </figure>
            </div>
        </div>
    </template>
    <template id="ai-message-template">
        <div class="ai-message-container">
            <div class="ai-message">
                <figure class="image-container">
                    <img src="./res/imgs/claudio.png" alt="Il nostro Claudio, l'ai italiana più snob di sempre"
                        class="ai-image">
                </figure>
                <p id="ai-text" class="ai-text content"></p>
            </div>
        </div>
    </template>
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-full chat-container">
            </div>
            <div class="column is-full form-container">
                <form action="" class="columns align-items-stretch" id="user-input-form">
                    <input class="input column is-10" type="text" id="user-message-input"
                        placeholder="Ciao, dimmi pure cosa ti serve...">
                    <button class="button column is-2" type="submit">Invia</button>
                </form>
            </div>
        </div>

    </div>



    <script src="scripts/config.js"></script>
    <script src="scripts/functions.js"></script>
</body>

</html>
